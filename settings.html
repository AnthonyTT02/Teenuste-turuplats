<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Настройки - SOS Narva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sos-page">

<div class="sos-sidebar" id="sidebar">
  <h4>Меню</h4>
  <a href="Provider_Reg_1.html">Авторизация поставщика услуг</a>
  <a href="cabinet.html">Личный кабинет</a>
  <a href="settings.html">Настройки</a>
  <a href="terms.html">Условия пользования</a>
  <a href="security.html">Правила безопасности</a>
  <a href="get-started.html">Как начать работать</a>
  <a href="for-business.html">— для юр. лиц</a>
  <a href="for-individuals.html">— для физ. лиц</a>
  <a href="contacts.html">Контакты</a>
</div>
<div class="sos-overlay" id="overlay"></div>

<div class="phone-frame">
  <div class="sos-header">
    <a href="cabinet.html" class="sos-logo">SOS Narva</a>
    <button class="sos-menu-btn" id="menuBtn">
      <svg class="sos-menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 12h16M4 18h6"/>
      </svg>
    </button>
  </div>

  <div style="padding: 20px;">
    <h2>Настройки</h2>
    
    <div style="margin-top: 20px;">
      <h3>Безопасность</h3>
      <label class="sos-check-line">
        <input type="checkbox" checked>
        Двухфакторная аутентификация
      </label>
      <label class="sos-check-line">
        <input type="checkbox" checked>
        Уведомления по email
      </label>
      <label class="sos-check-line">
        <input type="checkbox">
        Уведомления по SMS
      </label>
    </div>

    <div style="margin-top: 20px;">
      <h3>Конфиденциальность</h3>
      <label class="sos-check-line">
        <input type="checkbox" checked>
        Видны мои заказы
      </label>
      <label class="sos-check-line">
        <input type="checkbox" checked>
        Разрешить отзывы
      </label>
    </div>

    <button class="btn-sos-primary sos-mb-3" style="margin-top: 20px;">Сохранить изменения</button>
  </div>
</div>

<script>
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const menuBtn = document.getElementById('menuBtn');

  menuBtn.addEventListener('click', () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
  });

  overlay.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });
</script>

</body>
</html>
