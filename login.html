<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход — SOS Narva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sos-page">
<div class="phone-frame">
  <div class="sos-header">
    <a href="cabinet.html" class="sos-logo">SOS Narva</a>
  </div>
  <div style="text-align: center; padding: 40px 20px;">
    <h2 style="color: #e53935;">Вход</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Имя пользователя" required style="margin-bottom:10px;width:90%;"><br>
      <input type="password" name="password" placeholder="Пароль" required style="margin-bottom:10px;width:90%;"><br>
      <button type="submit" class="btn-sos-primary">Войти</button>
    </form>
    <div id="loginError" style="color:#e53935;margin-top:10px;display:none;"></div>
  </div>
</div>
<script>
  document.getElementById('loginForm').onsubmit = async function(e) {
    e.preventDefault();
    const username = this.username.value;
    const password = this.password.value;
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = 'Slide_1.html';
    } else {
      document.getElementById('loginError').innerText = data.error || 'Ошибка входа';
      document.getElementById('loginError').style.display = 'block';
    }
  };
</script>
</body>
</html>
